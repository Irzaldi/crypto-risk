    /* ─── THE NEW OPTIMIZED ENGINE ─── */
    
    // Fix 1: Racing Parallel Fetch (Instant Data)
    async function smartFetch(url) {
        const mirrors = [
            url.replace('api.binance.com', 'api.binance.com'),
            url.replace('api.binance.com', 'api1.binance.com'),
            url.replace('api.binance.com', 'api3.binance.com')
        ];
        try {
            return await Promise.any(mirrors.map(u => 
                fetch(u).then(r => r.ok ? r.json() : Promise.reject())
            ));
        } catch (e) { return null; }
    }

    // Fix 2: RequestAnimationFrame (Smooth Charts)
    let _drawPending = false;
    function requestChartDraw(data) {
        if (_drawPending) return;
        _drawPending = true;
        requestAnimationFrame(() => {
            drawMiniChart(data); // Call your original draw function
            _drawPending = false;
        });
    }

    // Fix 3: Non-Blocking Analysis
    // Instead of doing math instantly, we wait 100ms for the UI to finish rendering
    function dispatchAnalysis(data) {
        setTimeout(() => {
            // Your original heavy math (RSI, EMA, etc.)
            runAnalysis(data); 
        }, 100);
    }
