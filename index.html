<script>
const WORKER = 'https://crypto-proxy.irzaldi.workers.dev';

async function fetch_data() {
  const sym = document.getElementById('sym').value.toUpperCase().trim();
  if (!sym) { alert('Enter a symbol'); return; }
  
  try {
    const api_url = `https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}USDT`;
    const worker_url = `${WORKER}?url=${encodeURIComponent(api_url)}`;
    
    console.log('Fetching from:', worker_url);
    const res = await fetch(worker_url);
    const text = await res.text();
    console.log('Response:', text);
    const data = JSON.parse(text);
    
    if (data.code) {
      alert('Error: ' + data.msg);
      return;
    }
    
    document.getElementById('price').innerText = '$' + parseFloat(data.lastPrice).toFixed(2);
    document.getElementById('change').innerText = parseFloat(data.priceChangePercent).toFixed(2) + '%';
    document.getElementById('change').style.color = data.priceChangePercent >= 0 ? '#00ff88' : '#ff2d55';
    document.getElementById('high').innerText = '$' + parseFloat(data.highPrice).toFixed(2);
    document.getElementById('low').innerText = '$' + parseFloat(data.lowPrice).toFixed(2);
  } catch(e) {
    console.error('Full error:', e);
    alert('Error: ' + e.message);
  }
}
</script>
